<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить ресторан - Yammy</title>
    <link rel="stylesheet" href="css/gen/reset.css">
    <link rel="stylesheet" href="css/gen/variables.css">
    <link rel="stylesheet" href="css/gen/base.css">
    <link rel="stylesheet" href="css/gen/header.css">
    <link rel="stylesheet" href="css/gen/footer.css">
    <link rel="stylesheet" href="css/gen/components.css">
    <link rel="stylesheet" href="css/gen/utilities.css">
    <link rel="stylesheet" href="css/pages/add.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"><div class="logo-placeholder">🍽️ YAMMY</div></a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Рестораны</a></li>
                <li><a href="about.html">О нас</a></li>
            </ul>
            <a href="auth.html" class="profile-link" id="profile-link"><div class="profile-placeholder" id="profile-icon">👤</div></a>
        </nav>
    </header>

    <main class="container">
        <div class="add-restaurant-header">
            <h1>Добавить новый ресторан</h1>
            <p>Заполните информацию о ресторане для добавления в каталог</p>
        </div>

        <form class="add-form">
            <div class="form-group">
                <label for="restaurant-name">Название ресторана *</label>
                <input type="text" id="restaurant-name" required>
            </div>
            <div class="form-group">
                <label for="restaurant-description">Описание ресторана *</label>
                <textarea id="restaurant-description" rows="6" required></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="cuisine-type">Тип кухни *</label>
                    <select id="cuisine-type" required>
                        <option value="">Выберите</option>
                        <option value="Итальянская">Итальянская</option>
                        <option value="Грузинская">Грузинская</option>
                        <option value="Японская">Японская</option>
                        <option value="Американская">Американская</option>
                        <option value="Русская">Русская</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="restaurant-type">Тип заведения *</label>
                    <select id="restaurant-type" required>
                        <option value="">Выберите</option>
                        <option value="Ресторан">Ресторан</option>
                        <option value="Кафе">Кафе</option>
                        <option value="Бар">Бар</option>
                        <option value="Кофейня">Кофейня</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="price-range">Ценовой диапазон *</label>
                    <select id="price-range" required>
                        <option value="">Выберите</option>
                        <option value="$">$ (до 1000₽)</option>
                        <option value="$$">$$ (1000-2000₽)</option>
                        <option value="$$$">$$$ (2000-4000₽)</option>
                        <option value="$$$$">$$$$ (4000-7000₽)</option>
                        <option value="$$$$$">$$$$$ (от 7000₽)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="phone">Телефон *</label>
                    <input type="tel" id="phone" required placeholder="+7 (XXX) XXX-XX-XX">
                </div>
            </div>
            <div class="address-fields">
                <div class="form-group">
                    <label for="city">Город *</label>
                    <input type="text" id="city" required>
                </div>
                <div class="form-group">
                    <label for="street">Улица *</label>
                    <input type="text" id="street" required>
                </div>
                <div class="form-group">
                    <label for="house">Дом *</label>
                    <input type="text" id="house" required>
                </div>
            </div>
            <div class="form-group">
                <label for="opening-date">Дата открытия *</label>
                <input type="text" id="opening-date" required placeholder="ДД.ММ.ГГГГ">
            </div>
            <div class="form-group">
                <label for="image-url">URL изображения (необязательно)</label>
                <input type="text" id="image-url" placeholder="https://example.com/photo.jpg">
            </div>
            <div class="form-actions">
                <button type="button" class="btn" id="submit-restaurant">Добавить ресторан</button>
                <a href="admin.html" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <h3>Yammy</h3>
                <p>Платформа для настоящих ценителей гастрономии. Мы помогаем найти идеальное место для любого события.</p>
                <p>Артур Ш. 2025</p>
            </div>
            <div class="social-links">
                <a href="#"><img src="images/telegram.png" alt="Telegram"></a>
                <a href="#"><img src="images/dzen.png" alt="Яндекс Дзен"></a>
                <a href="#"><img src="images/vk.png" alt="ВКонтакте"></a>
                <a href="#"><img src="images/yand.png" alt="Яндекс"></a>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/validation.js"></script> 
    <script src="js/add.js"></script>
</body>
</html>
