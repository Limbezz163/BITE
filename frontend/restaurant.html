<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ресторан - Yammy</title>
    <link rel="stylesheet" href="css/gen/reset.css">
    <link rel="stylesheet" href="css/gen/variables.css">
    <link rel="stylesheet" href="css/gen/base.css">
    <link rel="stylesheet" href="css/gen/header.css">
    <link rel="stylesheet" href="css/gen/footer.css">
    <link rel="stylesheet" href="css/gen/components.css">
    <link rel="stylesheet" href="css/gen/utilities.css">
    <link rel="stylesheet" href="css/pages/restaurant.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo"><div class="logo-placeholder">🍽️ YAMMY</div></a>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html">Рестораны</a></li>
                <li><a href="about.html">О нас</a></li>
            </ul>
            <a href="auth.html" class="profile-link" id="profile-link"><div class="profile-placeholder" id="profile-icon">👤</div></a>
        </nav>
    </header>

    <main class="container">
        <div class="restaurant-header card">
            <h1 class="restaurant-title" id="restaurant-name">Загрузка...</h1>
            <div class="restaurant-meta">
                <div class="meta-item" id="restaurant-cuisine">—</div>
                <div class="meta-item rating" id="restaurant-rating">★ 0</div>
                <div class="meta-item" id="restaurant-type">—</div>
                <div class="meta-item price" id="restaurant-price">—</div>
            </div>
        </div>

        <div class="carousel card">
            <img src="images/placeholder.png" alt="Фото ресторана" id="carousel-image">
            <button class="favorite-btn" id="favorite-btn" style="display: none;">♡</button>
        </div>

        <div class="description card" id="restaurant-description"></div>

        <div class="location card">
            <h2 class="div-title">Местоположение</h2>
            <p class="location-address" id="restaurant-address"></p>
        </div>

        <div class="add-review card">
            <h2 class="div-title">Добавить отзыв</h2>
            <div class="star-rating">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <textarea placeholder="Напишите ваш отзыв..." rows="5" id="review-text"></textarea>
            <button class="btn" id="add-review-btn" disabled>Добавить отзыв</button>
        </div>

        <div class="reviews-list">
            <h2 class="div-title">Отзывы</h2>
            <div id="reviews-container"></div>
            <div class="show-more" id="show-more-reviews">
                <button class="btn btn-secondary">Показать еще отзывы</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-info">
                <h3>Yammy</h3>
                <p>Платформа для настоящих ценителей гастрономии. Мы помогаем найти идеальное место для любого события.</p>
                <p>Артур Ш. 2025</p>
            </div>
            <div class="social-links">
                <a href="#"><img src="images/telegram.png" alt="Telegram"></a>
                <a href="#"><img src="images/dzen.png" alt="Яндекс Дзен"></a>
                <a href="#"><img src="images/vk.png" alt="ВКонтакте"></a>
                <a href="#"><img src="images/yand.png" alt="Яндекс"></a>
            </div>
        </div>
    </footer>
    <div class="scroll-to-top" id="scrollToTop">↑</div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/restaurant.js"></script>
    <script>
        window.onscroll = function() {
            const btn = document.getElementById('scrollToTop');
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300)
                btn.classList.add('show');
            else
                btn.classList.remove('show');
        };
        document.getElementById('scrollToTop')?.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
